<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fixture: plain wire transfer form</title>
    <style>
      body { font: 15px system-ui, sans-serif; max-width: 560px; margin: 40px auto; }
      label { display: block; margin: 14px 0 4px; font-weight: 600; }
      input { width: 100%; padding: 8px; font-size: 15px; }
      button { margin-top: 18px; padding: 10px 18px; }
    </style>
  </head>
  <body>
    <h1>ACME Bank — Wire Transfer (fixture)</h1>
    <form action="#" method="post">
      <label for="routing">Routing number (ABA)</label>
      <input id="routing" name="routing_number" inputmode="numeric" value="021000021" />

      <label for="account">Beneficiary account number</label>
      <input id="account" name="account_number" inputmode="numeric" />

      <label for="amount">Wire amount (USD)</label>
      <input id="amount" name="amount" />

      <label for="iban">IBAN (international)</label>
      <input id="iban" name="iban" />

      <button type="submit">Send wire</button>
    </form>
  </body>
</html>
